name: Publish to PyPI

# Publishes when you create a GitHub Release (tag like v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token stored anywhere.
# One-time setup on pypi.org: Account -> Publishing -> add a "pending publisher"
#   project:  fastagent-framework
#   owner:    <your GitHub username>
#   repo:     fastagent
#   workflow: publish.yml
#   environment: pypi

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: pip install build twine
      - name: Run offline tests
        run: |
          pip install -e .
          python tests/test_smoke.py
      - name: Build sdist and wheel
        run: python -m build
      - name: Validate distribution metadata
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
